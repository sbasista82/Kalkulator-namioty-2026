<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Przystań Zagać</title>
<style>
body{background:#f3f4f6;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:16px;max-width:440px;margin:16px auto}
.card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.1)}
.row{display:flex;justify-content:space-between;align-items:center;background:#f9fafb;padding:12px;border-radius:12px;margin-bottom:12px}
.counter{display:flex;align-items:center;gap:12px}
button{width:40px;height:40px;border:none;border-radius:50%;cursor:pointer;font-size:20px}
.btn-minus{background:#d1fae5}.btn-plus{background:#059669;color:#fff}
.value{min-width:24px;text-align:center;font-weight:700}
.select-box{width:100%;padding:12px;border-radius:12px;margin:12px 0 24px;box-sizing:border-box}
.summary{text-align:center;border-top:1px dashed #ddd;padding-top:16px;margin-top:20px}
.total-amount{font-size:42px;font-weight:900}
.discount-active{display:none;color:#059669;font-weight:700}
</style>
</head>
<body>
<div class="card">
<h1>🏕️ Przystań Zagać</h1>

<div class="row">
<div><strong>Liczba nocy</strong><br><span id="discount-alert">Min. 5 nocy = 10% rabatu!</span></div>
<div class="counter">
<button type="button" id="btn-dni-minus">-</button>
<span id="v-dni" class="value">1</span>
<button type="button" id="btn-dni-plus" class="btn-plus">+</button>
</div>
</div>

<div class="row"><div>Dorośli (20 zł/doba)</div><div class="counter"><button type="button" id="btn-dorosli-minus">-</button><span id="v-dorosli" class="value">0</span><button type="button" id="btn-dorosli-plus" class="btn-plus">+</button></div></div>

<div class="row"><div>Dzieci 3-12 lat (10 zł/doba)</div><div class="counter"><button type="button" id="btn-dzieci-minus">-</button><span id="v-dzieci" class="value">0</span><button type="button" id="btn-dzieci-plus" class="btn-plus">+</button></div></div>

<div class="row"><div>Dzieci do 3 lat (gratis)</div><div class="counter"><button type="button" id="btn-bobasy-minus">-</button><span id="v-bobasy" class="value">0</span><button type="button" id="btn-bobasy-plus" class="btn-plus">+</button></div></div>

<select id="v-nocleg" class="select-box">
<option value="brak">Brak - 0 zł</option>
<option value="maly_namiot">Mały namiot - 10 zł</option>
<option value="duzy_namiot">Duży namiot - 20 zł</option>
<option value="przyczepa">Przyczepa - 30 zł</option>
<option value="camper">Camper - 30 zł</option>
</select>

<div class="row"><div>Prąd (20 zł/doba)</div><input type="checkbox" id="v-prad"></div>

<div class="row"><div>Pranie (30 zł)</div><div class="counter"><button type="button" id="btn-pranie-minus">-</button><span id="v-pranie" class="value">0</span><button type="button" id="btn-pranie-plus" class="btn-plus">+</button></div></div>

<div class="summary">
<div id="rabat-info" class="discount-active">🎉 Zastosowano rabat 10%</div>
<div class="total-amount"><span id="total">0</span> zł</div>
</div>
</div>

<script>
(function(){
const CENNIK={dorosly:20,dzieci:10,maly_namiot:10,duzy_namiot:20,przyczepa:30,camper:30,brak:0,prad:20,pranie:30};
const dane={dni:1,dorosli:0,dzieci:0,bobasy:0,pranie:0};

function updateView(){
 document.getElementById('v-dni').textContent=dane.dni;
 document.getElementById('v-dorosli').textContent=dane.dorosli;
 document.getElementById('v-dzieci').textContent=dane.dzieci;
 document.getElementById('v-bobasy').textContent=dane.bobasy;
 document.getElementById('v-pranie').textContent=dane.pranie;
}

function calculate(){
 const dni=dane.dni;
 let suma=(dane.dorosli*CENNIK.dorosly*dni)+
          (dane.dzieci*CENNIK.dzieci*dni)+
          (CENNIK[document.getElementById('v-nocleg').value]*dni)+
          (document.getElementById('v-prad').checked ? CENNIK.prad*dni : 0)+
          (dane.pranie*CENNIK.pranie);

 const rabatInfo=document.getElementById('rabat-info');
 const alert=document.getElementById('discount-alert');

 if(dni>=5){
   suma*=0.9;
   rabatInfo.style.display='block';
   alert.textContent='Rabat 10% aktywny!';
 } else {
   rabatInfo.style.display='none';
   alert.textContent='Min. 5 nocy = 10% rabatu!';
 }

 document.getElementById('total').textContent=Math.round(suma);
}

function bindCounter(name,min){
 document.getElementById('btn-'+name+'-plus').addEventListener('click',function(){
   dane[name]++;
   updateView(); calculate();
 });
 document.getElementById('btn-'+name+'-minus').addEventListener('click',function(){
   dane[name]=Math.max(min,dane[name]-1);
   updateView(); calculate();
 });
}

bindCounter('dni',1);
bindCounter('dorosli',0);
bindCounter('dzieci',0);
bindCounter('bobasy',0);
 
bindCounter('pranie',0);

document.getElementById('v-nocleg').addEventListener('change',calculate);
document.getElementById('v-prad').addEventListener('change',calculate);

updateView();
calculate();
})();
</script>
</body>
</html>
